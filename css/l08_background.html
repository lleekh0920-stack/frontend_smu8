<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>배경에 이미지를 넣어보자</title>
</head>
<body>
  <h1>배경에 이미지를 넣어보자</h1>
  <h2>img는 인라인으로 취급되어 배경으로 사용하기 어렵다</h2>
  <hr>
  <div>
    <img src="/src/img/img_2.png" width="300" alt="해달">
    안녕~
  </div>
  <h2>background-image</h2>
  <div style="height: 400px;
  background-image: url('/src/img/img_2.png');
  background-size: 100px auto;
  background-repeat: repeat-y;
  background-color: #ffd5e7;
  /*background: #ffd5e7; 배경의 하위 속성은 없애고 컬러만 적용*/
"></div>
  <hr>
  <div style="height: 200px; background-image: url('/src/img/img_1.png') "
  ></div>
  <hr>
  <div style="height:300px; border: 8px dashed;
    background-image: url('/src/img/img.png'),
                      url('/src/img/img_2.png'),
                      url('/src/img/img_1.png');
    background-size: 50px 50px,
                     100px 100px,
                     20px;
    background-repeat: no-repeat, no-repeat, repeat;
    background-position: 50px 50px, bottom right;
    background-color:pink;;
    background-origin: padding-box;
">
  </div>

  <hr>
  <div style="width: 400px; height: 100px;
    background-color: #ffd5e7;
    background-image: url('/src/img/img_1.png');
    background-size: 100% 100%;
"></div>

  <hr>
  <div style="width: 400px; height: 100px;
    background-color: #ffd5e7;
    background-image: url('/src/img/img_1.png');
    background-size: contain;
"></div>
  <div style="width: 400px; height: 200px;
    background-color: #ffd5e7;
    background-image: url('/src/img/img_1.png');
    background-size: cover;
"></div>

  <div style="height: 300px;
  background-image: linear-gradient(90deg,#f00 0%, #0f0 50% ,#00f 100%);
  background-size: 100px;
">

  </div>

  <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>
</html>
