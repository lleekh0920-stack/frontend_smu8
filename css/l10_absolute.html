<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>absolute 포지션 복습</title>
</head>
<body>
  <h1>absolute 포지션 복습</h1>
  <div style="position: relative; height: 300px; border: 1px solid;">
    <div style="
    background-color: #ffd5e7;
    position: absolute;
    top: calc(50% - 70px/2);
    left: calc(50% - 70px/2);
    height: 70px;
    width: 70px;
  ">
      박스
    </div>
  </div>

</body>
</html>
