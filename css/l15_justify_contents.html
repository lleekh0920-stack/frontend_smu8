<head>
    <meta charset="UTF-8">
    <title>flex 로 정렬하기</title>
  <style>
    body{
      margin: 0; padding: 0;
    }
    #topNav{
      background-color: black;
      display: flex;
      justify-content: center;
      position: sticky;
      top: 0;
    }
    #topNav>ul{
      list-style: none;
      padding-left: 0;
      margin: 0;
      display: flex;
      justify-content: space-evenly;
      width: 400px;
      height: 5em;
      align-items: center;
    }
    #topNav a{
      color: white;
      text-decoration: none;
    }
    #topNav>ul>li{
      padding: .5em;
    }
