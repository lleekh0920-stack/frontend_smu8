<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>media로 grid 를 RWD 레이아웃을 구성하자</title>
    <style>
        body{padding: 0; margin: 0;
            display: grid;
            grid-template-areas:
            "header header  header  header  header"
            "nav    main    main    main    aside"
            "footer footer  footer  footer  footer";
        }
        header{
            grid-area: header;
            background-color: orangered;
            height: 4em;
        }
        nav{
            grid-area: nav;
            background-color: cadetblue;
        }
        main{
            grid-area: main;
            background-color: orange;
        }
        aside{
            grid-area: aside;
            background: violet;
        }
        footer{
            grid-area: footer;
            background: black;
            color: white;
        }
        @media screen and (max-width: 1200px){
            body{
                grid-template-areas:
                "header header header header"
                "nav main main main"
                "aside aside aside aside"
                "footer footer footer footer";
            }
        }
        @media screen and (max-width: 550px){
            body{
                grid-template-areas:
                "header"
                "nav"
                "main"
                "aside"
                "footer";
            }
        }
    </style>
</head>
<body>
    <header>
        사이트의 해더 (메뉴, 홈)
    </header>
    <nav>왼쪽메뉴</nav>
    <main>메인 내욜
        <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
    </main>
    <aside>광고</aside>
    <footer>
        회사정보
    </footer>
</body>
</html>
