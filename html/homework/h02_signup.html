<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 양식</title>
    <style>
        body {
            background-color: #f4f4f4;
            font-family: "Malgun Gothic", sans-serif;
            line-height: 1.5;
        }

        .wrap {
            width: 700px;
            margin: 30px auto;
            padding: 30px;
            border: 1px solid #cccccc;
            background-color: #ffffff;
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            text-align: center;
        }

        p.description {
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
        }

        fieldset {
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid #999999;
        }

        legend {
            padding: 0 10px;
            font-weight: bold;
        }

        .form-row {
            margin-bottom: 14px;
        }

        .form-label {
            display: inline-block;
            width: 130px;
            vertical-align: top;
            font-weight: bold;
        }

        .input-box {
            width: 220px;
            padding: 8px;
            border: 1px solid #aaaaaa;
            box-sizing: border-box;
        }

        textarea.input-box {
            width: 400px;
            height: 100px;
        }

        .option-group {
            display: inline-block;
            width: 500px;
        }

        .option-group label {
            display: inline-block;
            margin-right: 12px;
            margin-bottom: 8px;
        }

        .btn-area {
            margin-top: 25px;
            text-align: center;
        }

        .btn {
            display: inline-block;
            width: 120px;
            margin: 0 8px;
            padding: 10px 0;
            border: 1px solid #666666;
            background-color: #eeeeee;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>회원가입 양식</h1>
        <p class="description">다양한 입력 요소를 사용한 수업용 예제</p>

        <form action="#" method="post">
            <input type="hidden" name="memberGrade" value="basic">

            <fieldset>
                <legend>기본 정보</legend>

                <div class="form-row">
                    <label class="form-label" for="userId">아이디</label>
                    <input class="input-box" type="text" id="userId" name="userId" placeholder="영문 8자 이상">
                </div>

                <div class="form-row">
                    <label class="form-label" for="userPw">비밀번호</label>
                    <input class="input-box" type="password" id="userPw" name="userPw" placeholder="비밀번호 입력">
                </div>

                <div class="form-row">
                    <label class="form-label" for="userName">이름</label>
                    <input class="input-box" type="text" id="userName" name="userName" placeholder="이름 입력">
                </div>

                <div class="form-row">
                    <label class="form-label" for="userEmail">이메일</label>
                    <input class="input-box" type="email" id="userEmail" name="userEmail" placeholder="example@email.com">
                </div>

                <div class="form-row">
                    <label class="form-label" for="userTel">연락처</label>
                    <input class="input-box" type="tel" id="userTel" name="userTel" placeholder="010-0000-0000">
                </div>

                <div class="form-row">
                    <label class="form-label" for="birth">생년월일</label>
                    <input class="input-box" type="date" id="birth" name="birth">
                </div>
            </fieldset>

            <fieldset>
                <legend>추가 정보</legend>

                <div class="form-row">
                    <span class="form-label">성별</span>
                    <span class="option-group">
                        <label><input type="radio" name="gender" value="male"> 남자</label>
                        <label><input type="radio" name="gender" value="female"> 여자</label>
                        <label><input type="radio" name="gender" value="none"> 선택 안 함</label>
                    </span>
                </div>

                <div class="form-row">
                    <span class="form-label">관심 분야</span>
                    <span class="option-group">
                        <label><input type="checkbox" name="interest" value="html"> HTML</label>
                        <label><input type="checkbox" name="interest" value="css"> CSS</label>
                        <label><input type="checkbox" name="interest" value="javascript"> JavaScript</label>
                        <label><input type="checkbox" name="interest" value="design"> 디자인</label>
                    </span>
                </div>

                <div class="form-row">
                    <label class="form-label" for="major">전공</label>
                    <select class="input-box" id="major" name="major">
                        <option value="">선택하세요</option>
                        <option value="computer">컴퓨터공학</option>
                        <option value="design">디자인</option>
                        <option value="business">경영학</option>
                        <option value="etc">기타</option>
                    </select>
                </div>

                <div class="form-row">
                    <label class="form-label" for="grade">학년</label>
                    <input class="input-box" type="number" id="grade" name="grade" min="1" max="4" value="1">
                </div>

                <div class="form-row">
                    <label class="form-label" for="photo">프로필 사진</label>
                    <input type="file" id="photo" name="photo">
                </div>

                <div class="form-row">
                    <label class="form-label" for="color">좋아하는 색</label>
                    <input type="color" id="color" name="color" value="#66aaff">
                </div>

                <div class="form-row">
                    <label class="form-label" for="studyTime">공부 시간</label>
                    <input type="range" id="studyTime" name="studyTime" min="0" max="10" value="5">
                </div>

                <div class="form-row">
                    <label class="form-label" for="intro">자기소개</label>
                    <textarea class="input-box" id="intro" name="intro" placeholder="간단한 자기소개를 입력하세요."></textarea>
                </div>
            </fieldset>

            <fieldset>
                <legend>약관 동의</legend>

                <div class="form-row">
                    <span class="form-label">동의 항목</span>
                    <span class="option-group">
                        <label><input type="checkbox" name="agreeAge"> 만 14세 이상입니다.</label>
                        <label><input type="checkbox" name="agreeTerms"> 이용약관에 동의합니다.</label>
                        <label><input type="checkbox" name="agreePrivacy"> 개인정보 수집에 동의합니다.</label>
                    </span>
                </div>
            </fieldset>

            <div class="btn-area">
                <input class="btn" type="submit" value="회원가입">
                <input class="btn" type="reset" value="다시작성">
            </div>
        </form>
    </div>
</body>
</html>
