<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1>안녕하세요~!!!!!</h1>
    <p>에밋 자동완성</p>
    <!--    ul>li{$$안녕~~}*3-->
    <!-- 주석 : 실행(브라우저 렌더링)되지 않는코드 -->
    <h2>작은 제목 태그</h2>
    <h3>작은 제목 태그</h3>
    <h4>작은 제목 태그</h4>
    <h5>작은 제목 태그</h5>
    <h6>작은 제목 태그</h6>
    <h7>제목태그는 h1~h6까지만 존재함</h7>

    <p>
        <b>p 요소</b>는 <i>블럭 요소로</i>
        한줄을 레이아웃으로 구성
    </p>
    <p>일반적으로 문자열에
        포함된 라인개행(엔터\n)은
        출력되지 않는다!!</p>
    <pre>pre으로 문자열에
포함된 라인개행(엔터\n)은
출력한다!</pre>
    <!--  xml 규칙중에 컨텐츠가 없는 요소는 한요소에
            열고 닫는것이 같이 존재함  <br/> -> xhtml, html4
          xml 규칙을 무시하고 유연하게 작성하는 방식을 html5 라 합니다.
             -->
    <hr>
    <hr/>
    <hr></hr>
    <p>
        hr 과 br은 라인개행<br> 요소입니다.
        <br> 내부에 Contents를 포함하지 않는
        말단요소는 닫는 요소가 없음
    </p>
    <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
</body>
</html>
