<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>요소와 속성</title>
</head>
<body>
    <h1 style="color:blue;text-decoration: underline">
        요소와 속성
    </h1>
    <h2> input 요소와 속성</h2>
    <p>속성은 요소의 상태를 변경합니다.</p>
    <form action="/a">
        <ul>
            <li>text(default): <input></li>
            <li>value="1234": <input value="1234"></li>
            <li>password: <input type="password"></li>
            <li>checkbox:
                <input type="checkbox" name="hobby" value="그림">
                <input type="checkbox" name="hobby" value="노래">
                <input type="checkbox" name="hobby" value="쇼핑">
            </li>
            <li>radio:
                <input type="radio" name="gender" value="남자">
                <input type="radio" name="gender" value="여자">
            </li>
            <li>
                <input type="color">
                <input type="color" value="#FFFFFF">
                <input type="color" value="#F00">
                <input type="color" value="#00F">
            </li>
            <li>
                <input type="button" value="버튼">
                <input type="submit" value="제출">
                <input type="reset" value="초기화">
            </li>
            <li>
                <button>제출</button>
                <button type="reset">초기화</button>
                <button type="button">버튼</button>
            </li>
        </ul>
    </form>
    <h2>img 태그와 속성</h2>
    <p>
        <img src="/aa" alt="없음">
        <img src="/src/img/img.png" width="100" alt="강아지">
        <img src="/src/img/img.png" width="100" height="100" alt="강아지">
        <img src="/src/img/img.png" style="width: 100px" alt="강아지">
    </p>
</body>
</html>
