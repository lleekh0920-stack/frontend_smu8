<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>속성 및 요소 작성법</title>
</head>
<body>
    <h1>속성 및 요소 작성법</h1>
    <h1>요소는 열며 닫아야한다!</h1>
    <h1>안녕!</h1>
    <br>
    <hr>
    <hr/>
    <!-- 컨텐츠를 포함할 수 없는 말단요소(마지막 자식)은 닫힘을 작성하지 않음 -->
    <img src="/src/img/img.png" width="100" alt="강아지사진">
    <!--alt 웹 접근성 : 장애인과 노령자도 웹 서비스를 이용할 수 있게 돕는것-->
    <hr>
    <h2>속성의 값을 작성하는 방법</h2>
    <input value="속성의 값은 큰따옴표"><hr>
    <input value='작은 따옴표'><hr>
    <input type="checkbox" checked>
    <!--  checked 는 존재하는 것만으로 true-->
    <input type="checkbox" checked="checked">
    <input type="checkbox" checked="false">
    <input type="checkbox" checked=false>
    <input type="checkbox">
    <input readonly>
    <input disabled>
    <hr>
<!--    <input value=속성의 값은 문자열><hr>-->
<!--    <input value=`백틱은 불가`><hr>-->

</body>
</html>
