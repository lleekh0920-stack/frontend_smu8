<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>스타일의 박스모델</title>
  <style>
    .ex1{
      box-sizing: border-box;
      /*
      border-box : 너비 높이를 테두리까지
      content-box(기본값) : 너비 높이를 컨텐츠까지
      */
      width: 100px;
      height: 100px;
      border-width: 10px 5px 2px 1px;
      padding: 10px;
      margin: 0 10px;
      /*border-color: red;*/
      color: hotpink;
      border-style: solid;
      background-color: #eeFFee;
      /*display: block; 한줄을 다 가지려는 속성 div,p,h~*/
      /*display: inline; 글자속성 너비 높이가 없음 span,a,b*/
      display: inline-block;
    /*  글자처럼 라인에 포함되면서 너비 높이를 가진다.img*/
    }
  </style>
</head>
<body>
  <h1>스타일의 박스 모델</h1>
  <hr>
  <div class="box">박스</div>
  <div class="box">박스</div>
  <div class="box">박스</div>



  <hr>
  <div style="width: 100px; height: 100px; background-color: #ffd5e7">박스</div>
</body>
</html>
