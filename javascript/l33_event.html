<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>l33_event 노드 개체의 이벤트</title>
</head>
<body>
    <h1 onmouseenter="this.style.color='red';"
        onmouseleave="this.style.color='purple';"
        onmousedown="this.style.textDecoration='underline';"
        onmouseup="this.style.textDecoration='none';"
    >노드 개체의 이벤트를 재정의 하자!</h1>
    <hr>
    <h2 id="h2Title">js 로 노드 개체를 찾아서 이벤트를 재정의 하자</h2>
    <script>
        const h2Title=document.getElementById("h2Title");
        console.log(h2Title);
        //요소에 직접 이벤트를 정의하면 마지막에 정의한 함수만 적용됨
        h2Title.onclick=function (e){
            //console.log(e); //PointerEvent
            h2Title.style.color="blue";
            h2Title.style.color="purple";
            this.style.fontSize="2em";
        }
        h2Title.onclick=function(e){
            alert("안녕!");
        }
    </script>
</body>
</html>
