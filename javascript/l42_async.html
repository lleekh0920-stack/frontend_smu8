<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>l42_async 동기와 비동기에 대해 알아보자</title>
</head>
<body>
    <h1>동기와 비동기에 대해 알아보자</h1>

    <script>
        //동기
        let a=10;
        let b=20;
        console.log(a+b);
        // 코드가 순서대로 실행되어 동기화됨
        window.setTimeout(()=>{
            a=20;
            b=30;
        });
        console.log(a+b); // 50
        //코드가 순서대로 실행되지 않는 것

</body>
</html>
