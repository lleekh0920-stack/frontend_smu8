<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>l56_fetch fetch API 로 비동기 통신</title>
</head>
<body>
<h1>fetch API 로 비동기 통신</h1>
<hr>
<div>
    <p>
        <button id="ex1">fetch 로 Users 불러오기</button>
        <button id="ex2">XMLHttpRequest 로 Users 불러오기</button>
    </p>
    <div id="ex1Container"></div>
    <div id="ex2Container"></div>
</div>
<script>
    ex1.addEventListener("click",()=>{
        fetch("./l51_users.json").
        then((res)=>{
            console.log(res);
            return res.json()
        }).then((users)=>{
            console.log(users)
            ex1Container.innerText= JSON.stringify(users);
        })
    });
    ex2.addEventListener("click",()=>{
        const req=new XMLHttpRequest();
        req.open("GET","./l51_users.json");
        console.log("send()이전",req.responseText); //responseText: 통신에서 받아온데이터를 문자열로
        req.send();
        console.log("send()이후",req.responseText);
        //통신한 데이터의 값이 있으면 동기적으로 실행, 데이터가 없으면 통신은 비동기적으로 실행
        req.onload=function (){
            const usersObj=JSON.parse(req.responseText);
            ex2Container.innerText= JSON.stringify(usersObj,null,2)
        }
    })
</script>
</body>
</html>
