<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>l56_async_resolve async 함수사용법</title>
</head>
<body>
    <h1>async 함수 사용법</h1>
    <script>
        //node.js 에서는 전역에서 await 사용가능
        //browser는 무조건 async 함수에서만 작성 가능
        //await fetch("./l51_users.json")
        /*fetch("")
            .then((res)=>res.json())
            .then((arr)=>{})*/
        async function ex1(){
            let res= await fetch("./l51_users.json")
            let arr= await res.json();
            console.log(arr)
        }
        ex1();
        function ex2(){
            return new Promise(resolve => {
                resolve("안녕!");
            });
        }
        ex2().then((msg)=>{
            console.log("ex2(),then",msg);
        });
        (async function (){
            let msg = await ex2();
            console.log("await ex2()",msg)
        })();
    </script>
</body>
</html>
